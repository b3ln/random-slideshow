<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    #gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .gallery-img {
        height: 150px;
        object-fit: cover;
        border-radius: 6px;
        background: #eee;
    }

    /* Broken-image placeholder */
    .broken-placeholder {
        height: 150px; 
        width: 150px;       /* forced square */
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px dashed #999;
        color: #444;
        font-size: 20px;
        border-radius: 6px;
        background: #f5f5f5;
        font-family: monospace;
    }
</style>
</head>
<body>

<h2 id="title">Gallery</h2>
<div id="gallery"></div>

<div id="fullscreenViewer" style="display:none;">
    <img id="fullscreenImage">
</div>
    
<script>
// Read the ?file= query parameter
const params = new URLSearchParams(window.location.search);
const txtFileUrl = params.get("file");
// Track current image index
let currentIndex = 0;
let imageElements = [];

if (!txtFileUrl) {
    document.body.innerHTML = "<p style='color:red;'>Error: missing ?file= URL parameter.</p>";
} else {
    const fileName = decodeURIComponent(txtFileUrl.split('/').pop());
    document.title = "Gallery " + fileName;
    document.getElementById("title").textContent = "Gallery " + fileName;
    fetch(txtFileUrl)
        .then(res => res.text())
        .then(text => {
            const urls = text.split(/\r?\n/).filter(line => line.trim().length > 0);
            const gallery = document.getElementById("gallery");

            urls.forEach((url, index) => {
                const img = document.createElement("img");
                img.src = url.trim();
                img.className = "gallery-img";

                // Store images and add click handler
                imageElements.push(img);
                img.onclick = () => {
                    currentIndex = index;
                    openFullscreen();
                };

                // If image fails → replace with a numbered square frame
                img.onerror = () => {
                    const placeholder = document.createElement("div");
                    placeholder.className = "broken-placeholder";
                    placeholder.textContent = index + 1;  // line number (1-based)
                    gallery.replaceChild(placeholder, img);
                };

                gallery.appendChild(img);
            });
        })

        .catch(err => {
            document.body.innerHTML =
                "<p style='color:red;'>Failed to load the file.<br>" + err + "</p>";
        });
}


function openFullscreen() {
    const viewer = document.getElementById("fullscreenViewer");
    const viewerImg = document.getElementById("fullscreenImage");

    // Hide gallery + title
    document.getElementById("gallery").style.display = "none";
    document.getElementById("title").style.display = "none";

    viewerImg.src = imageElements[currentIndex].src;
    viewer.style.display = "flex";
    document.body.style.margin = "0";
}

function closeFullscreen() {
    document.getElementById("fullscreenViewer").style.display = "none";
    
    // Show gallery + title again
    document.getElementById("gallery").style.display = "flex";
    document.getElementById("title").style.display = "block";
    document.body.style.margin = "20px";
}

function showNext() {
    currentIndex = (currentIndex + 1) % imageElements.length;
    openFullscreen();
}

function showPrev() {
    currentIndex = (currentIndex - 1 + imageElements.length) % imageElements.length;
    openFullscreen();
}

document.getElementById("fullscreenViewer").onclick = closeFullscreen;

document.addEventListener("keydown", (e) => {
    const viewerVisible = document.getElementById("fullscreenViewer").style.display === "flex";
    if (!viewerVisible) return;

    if (e.key === "Escape") closeFullscreen();
    if (e.key === "ArrowRight") showNext();
    if (e.key === "ArrowLeft") showPrev();
});

    
</script>

</body>
</html>
