<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    #gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .gallery-img {
        height: 150px;
        object-fit: cover;
        border-radius: 6px;
        background: #eee;
    }

    .broken-placeholder {
        height: 150px; 
        width: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px dashed #999;
        color: #444;
        font-size: 20px;
        border-radius: 6px;
        background: #f5f5f5;
        font-family: monospace;
    }

    #fullscreenViewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
    }

    #fullscreenViewer img {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
    }

    #imageTitleOverlay {
        position: absolute;
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 1.4rem;
        max-width: 80%;
        text-align: center;
        display: none;
    }
</style>
</head>
<body>

<h2 id="title">Gallery</h2>
<div id="gallery"></div>

<div id="fullscreenViewer" style="display:none;">
    <img id="fullscreenImage">
    <div id="imageTitleOverlay"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const txtFileUrl = params.get("file");

let currentIndex = 0;
let imageElements = [];
let imageData = [];

let touchStartX = 0;
let touchEndX = 0;

if (!txtFileUrl) {
    document.body.innerHTML = "<p style='color:red;'>Error: missing ?file= URL parameter.</p>";
} else {

    const fileName = decodeURIComponent(txtFileUrl.split('/').pop());
    document.title = "Gallery " + fileName;
    document.getElementById("title").textContent = "Gallery " + fileName;

    fetch(txtFileUrl)
        .then(res => res.text())
        .then(text => {

            const gallery = document.getElementById("gallery");

            imageElements = [];
            imageData = [];

            let pendingTitle = null;

            // 🔥 HARD NORMALIZATION (fixes ALL newline + streaming weirdness)
            text = text.replace(/\r/g, "\n");

            const lines = text.split("\n").filter(l => l.trim() !== "");

            lines.forEach((rawLine) => {

                const line = rawLine.trim();
                if (!line) return;

                if (line.startsWith("#")) {
                    pendingTitle = line.substring(1).trim();
                    return;
                }

                const item = {
                    url: line,
                    title: pendingTitle
                };
                pendingTitle = null;

                const img = document.createElement("img");
                img.src = item.url;
                img.className = "gallery-img";

                const imgIndex = imageElements.length;

                imageElements.push(img);
                imageData.push(item);

                img.onclick = () => {
                    currentIndex = imgIndex;
                    openFullscreen();
                };

                img.onerror = () => {
                    const placeholder = document.createElement("div");
                    placeholder.className = "broken-placeholder";
                    placeholder.textContent = imgIndex + 1;
                    gallery.replaceChild(placeholder, img);
                };

                gallery.appendChild(img);
            });
        })
        .catch(err => {
            document.body.innerHTML =
                "<p style='color:red;'>Failed to load the file.<br>" + err + "</p>";
        });
}

function openFullscreen() {
    const viewer = document.getElementById("fullscreenViewer");
    const viewerImg = document.getElementById("fullscreenImage");
    const overlay = document.getElementById("imageTitleOverlay");

    document.getElementById("gallery").style.display = "none";
    document.getElementById("title").style.display = "none";

    const current = imageData[currentIndex];

    viewerImg.src = current.url;

    if (current.title) {
        overlay.textContent = current.title;
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }

    viewer.style.display = "flex";
    document.body.style.margin = "0";
}

function closeFullscreen() {
    document.getElementById("fullscreenViewer").style.display = "none";
    document.getElementById("gallery").style.display = "flex";
    document.getElementById("title").style.display = "block";
    document.body.style.margin = "20px";
}

function showNext() {
    currentIndex = (currentIndex + 1) % imageData.length;
    openFullscreen();
}

function showPrev() {
    currentIndex = (currentIndex - 1 + imageData.length) % imageData.length;
    openFullscreen();
}

document.getElementById("fullscreenViewer").onclick = closeFullscreen;

document.addEventListener("keydown", (e) => {
    const viewerVisible = document.getElementById("fullscreenViewer").style.display === "flex";
    if (!viewerVisible) return;

    if (e.key === "Escape") closeFullscreen();
    if (e.key === "ArrowRight") showNext();
    if (e.key === "ArrowLeft") showPrev();
});

const viewer = document.getElementById("fullscreenViewer");

viewer.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

viewer.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const threshold = 50;
    const diff = touchEndX - touchStartX;

    if (Math.abs(diff) < threshold) return;

    if (diff < 0) {
        showNext();
    } else {
        showPrev();
    }
}
</script>

</body>
</html>
